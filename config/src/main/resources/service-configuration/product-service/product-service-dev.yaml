spring:
    application:
        name: product-service

    datasource:
        url: jdbc:h2:mem:productdb
        driverClassName: org.h2.Driver
        username: ps
        password:
    jpa:
        database-platform: org.hibernate.dialect.H2Dialect
        hibernate:
            ddl-auto: update
        show-sql: true
        properties:
            hibernate-format_sql: true
    h2:
        console:
            enabled: true
            path: /h2-console


server:
    port: 6061

eureka:
    client:
        serviceUrl:
            defaultZone: http://localhost:6069/eureka/

management:
    endpoints:
        web:
            exposure:
                include: "*"
    tracing:
        sampling:
            probability: 1.0
logging:
    level:
        root: INFO
        com.imart.product-service:  TRACE


