server:
    port:   6066

spring:
    application:
        name:   gateway
    cloud:
        gateway:
            discovery:
                locator:
                    enabled:    true
                    lower-case-service-id:  true
            server:
                webflux:
                    routes:
                        -  id:  user-service
                           uri: lb://user-service
                           predicates:
                               -  Path=/api/v1/users/**
                               -  Path=/api/v1/admin/users/**
                        -  id:  product-service
                           uri: lb://user-service
                           predicates:
                               -  Path=/api/v1/products/**
                               -  Path=/api/v1/admin/products/**
                        -  id:    cart-service
                           uri:   lb://cart-service
                           predicates:
                               -  Path=/api/v1/carts/**
                               -   Path=/api/v1/user/**
                               -   Path=/api/v1/admin/carts
                        -  id:  inventory-service
                           uri: lb://inventory-service
                           predicates:
                               -  Path=/api/v1/inventory/**
                        -  id:  payment-service
                           uri: lb://payment-service
                           predicates:
                               -  Path=/api/v1/payment/**
eureka:
    client:
        service-url:
            defaultZone:    http://localhost:6069/eureka/
        register-with-eureka:   true
        fetch-registry: true

logging:
    level:
        root:   INFO
        org.springframework.cloud.gateway:  TRACE
        org.springframework.cloud.gateway.routes:   DEBUG
        org.springframework.web:    DEBUG