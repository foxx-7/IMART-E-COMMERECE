server:
    port:  6065

spring:
    application:
        name:   inventory-service
    datasource:
        uri: jdbc:h2:mem:inventorydb
        driverClassName: org.h2.Driver
        username: sa
        password:
    jpa:
        database-platform: org.hibernate.dialect.H2Dialect
        show-sql: true
        hibernate:
             ddl-auto: update
        properties:
            hibernate:
                format_sql: true
    h2:
        console:
            enabled: true
            path: /h2-console

eureka:
    client:
        service-url:
            defaultZone: http://localhost:6069/eureka/

management:
    endpoints:
        web:
            exposure:
                include: "*"
    tracing:
        sampling:
            probability: 1.0