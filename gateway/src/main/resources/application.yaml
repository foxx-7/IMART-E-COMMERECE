server:
    port: 6066

spring:
    application:
        name: gateway

    data:
        redis:
            host: localhost
            port: 6379

    cloud:
        gateway:
            discovery:
                locator:
                    enabled: true
                    lower-case-service-id: true

            default-filters:
                - TokenRelay
                - RemoveRequestHeader=Cookie

            globalcors:
                cors-configurations:
                    '[/**]':
                        allowedOrigins: "*"
                        allowedMethods:
                            - GET
                            - POST
                            - PUT
                            - DELETE
                        allowedHeaders: "*"

            routes:
                - id: user-service
                  uri: lb://user-service
                  predicates:
                      - Path=/api/v1/users/**,/api/v1/admin/users/**
                  filters:
                      - name: CircuitBreaker
                        args:
                            name: gatewayCB
                            fallbackUri: forward:/fallback/user
                      - name: RequestRateLimiter
                        args:
                            redis-rate-limiter.replenishRate: 10
                            redis-rate-limiter.burstCapacity: 20
                            key-resolver: "#{@userKeyResolver}"

                - id: product-service
                  uri: lb://product-service
                  predicates:
                      - Path=/api/v1/products/**
                  filters:
                      - name: CircuitBreaker
                        args:
                            name: gatewayCB
                            fallbackUri: forward:/fallback/product
                      - name: RequestRateLimiter
                        args:
                            redis-rate-limiter.replenishRate: 10
                            redis-rate-limiter.burstCapacity: 20
                            key-resolver: "#{@userKeyResolver}"

                - id: cart-service
                  uri: lb://cart-service
                  predicates:
                      - Path=/api/v1/carts/**
                  filters:
                      - name: CircuitBreaker
                        args:
                            name: gatewayCB
                            fallbackUri: forward:/fallback/cart
                      - name: RequestRateLimiter
                        args:
                            redis-rate-limiter.replenishRate: 10
                            redis-rate-limiter.burstCapacity: 20
                            key-resolver: "#{@userKeyResolver}"

                - id: inventory-service
                  uri: lb://inventory-service
                  predicates:
                      - Path=/api/v1/inventory/**
                  filters:
                      - name: CircuitBreaker
                        args:
                            name: gatewayCB
                            fallbackUri: forward:/fallback/inventory
                      - name: RequestRateLimiter
                        args:
                            redis-rate-limiter.replenishRate: 10
                            redis-rate-limiter.burstCapacity: 20
                            key-resolver: "#{@userKeyResolver}"

                - id: payment-service
                  uri: lb://payment-service
                  predicates:
                      - Path=/api/v1/payment/**
                  filters:
                      - name: CircuitBreaker
                        args:
                            name: gatewayCB
                            fallbackUri: forward:/fallback/payment
                      - name: RequestRateLimiter
                        args:
                            redis-rate-limiter.replenishRate: 10
                            redis-rate-limiter.burstCapacity: 20
                            key-resolver: "#{@userKeyResolver}"

    security:
        oauth2:
            resourceserver:
                jwt:
                    issuer-uri: http://localhost:4040/realms/Imart

eureka:
    client:
        service-url:
            defaultZone: http://localhost:6069/eureka/
        register-with-eureka: true
        fetch-registry: true

resilience4j:
    circuitbreaker:
        instances:
            gatewayCB:
                slidingWindowSize: 10
                failureRateThreshold: 50
                waitDurationInOpenState: 10s

logging:
    level:
        root: INFO
        org.springframework.cloud.gateway: DEBUG
        org.springframework.cloud.gateway.routes: DEBUG
        org.springframework.web: DEBUG